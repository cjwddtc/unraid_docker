name: Docker Image CI

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image-name:
        type: choice
        required: true
        default: debian_vnc
        options:
          - debian_vnc
          - bemfa-ha-bridge
  workflow_call:
    inputs:
      image-name:
        type: string
        required: true


jobs:

  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image-name: debian_vnc
            dockerfile: Dockerfile
          - image-name: bemfa-ha-bridge
            dockerfile: Dockerfile.bemfa-ha-bridge

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Load environment variables from docker.env
      run: |
        git pull
        cat docker.env >> $GITHUB_ENV
    - name: Select image
      id: image
      run: |
        requested="${{ inputs.image-name || github.event.inputs.image-name || '' }}"
        matrix_name="${{ matrix.image-name }}"
        if [ -n "$requested" ] && [ "$requested" != "$matrix_name" ]; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        echo "skip=false" >> "$GITHUB_OUTPUT"
        echo "name=$matrix_name" >> "$GITHUB_OUTPUT"
        echo "dockerfile=${{ matrix.dockerfile }}" >> "$GITHUB_OUTPUT"
    - name: Extract Docker metadata
      if: steps.image.outputs.skip != 'true'
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ steps.image.outputs.name }}
        tags: |
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          type=sha,prefix=,suffix=,format=short
          type=ref,event=tag
    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request' && steps.image.outputs.skip != 'true'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build and (conditionally) push
      if: steps.image.outputs.skip != 'true'
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ${{ steps.image.outputs.dockerfile }}
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          TMM_URL=${{ env.TMM_URL }}
          MEO_DICT_URL=${{ env.MEO_DICT_URL }}
          WIKI_DICT_URL=${{ env.WIKI_DICT_URL }}
          PAN_115_URL=${{ env.PAN_115_URL }}
          PAN_BAIDU_URL=${{ env.PAN_BAIDU_URL }}
          ROOT_PASSWORD=${{ secrets.ROOT_PASSWORD }}
